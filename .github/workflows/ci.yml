name: CI
on:
  push:
  pull_request:
    branches: [main]
jobs:
  awesome_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          npx awesome-lint
          npx awesome-lint README.ES.md
          npx awesome-lint README.FR.md
          npx awesome-lint README.PL-PL.md
          npx awesome-lint README.PT-BR.md
